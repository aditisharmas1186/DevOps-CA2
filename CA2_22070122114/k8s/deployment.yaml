apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-website-deployment
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9113"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-website
  template:
    metadata:
      labels:
        app: my-website
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
    spec:
      containers:
        # Container 1: Your Website
        - name: my-website
          image: manraj110/my-static-website:test
          ports:
            - containerPort: 80
          # This part is NEW: It tells Nginx where to find the config file
          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
        # Container 2: The Monitoring Sidecar
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:0.11
          args: ["-nginx.scrape-uri=http://localhost/stub_status"]
          ports:
            - containerPort: 9113
      # This part is NEW: It creates the volume from the ConfigMap
      volumes:
        - name: nginx-config-volume
          configMap:
            name: nginx-config

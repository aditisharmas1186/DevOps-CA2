apiVersion: v1
kind: Service
metadata:
  name: my-website-service
  labels:
    app: my-website

  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9113"
spec:
  type: NodePort
  selector:
    app: my-website
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: metrics
      port: 9113
      targetPort: 9113

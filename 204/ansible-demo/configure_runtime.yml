---
- name: Configure runtime environment for sentiment app
  hosts: webservers
  become: yes
  vars:
    app_user: appuser
    app_dir: /opt/sentiment
    repo_url: "https://github.com/Aryanfour5/twiiter_sent_Analysis.git"        # set to your GitHub URL if available, e.g. https://github.com/you/your-repo.git
    python_bin: /usr/bin/python3

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install required system packages
      apt:
        name:
          - python3
          - python3-venv
          - python3-pip
          - git
          - build-essential
        state: present
      when: ansible_os_family == "Debian"

    - name: Ensure app user exists
      user:
        name: "{{ app_user }}"
        system: no
        create_home: yes
        shell: /bin/bash

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Remove app directory if exists (for git clone)
      file:
        path: "{{ app_dir }}"
        state: absent
      when: repo_url != ""

    - name: Clone application repo (if repo_url provided)
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "main"
        force: yes
      when: repo_url != ""

    - name: Create Python virtualenv
      command: "{{ python_bin }} -m venv {{ app_dir }}/venv"
      args:
        creates: "{{ app_dir }}/venv/bin/activate"

    - name: Check if requirements.txt exists
      stat:
        path: "{{ app_dir }}/requirements.txt"
      register: requirements_file

    - name: Install python requirements (if requirements.txt exists)
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
      when: requirements_file.stat.exists


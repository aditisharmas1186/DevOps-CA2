
---
- name: Prepare runtime for vite_react_shadcn_ts
  hosts: app_hosts
  become: true
  tasks:
    - name: Ensure required apt packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        update_cache: true
        state: present

    - name: Install Docker repo key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: |
          deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo ${'{'}VERSION_CODENAME{'}'}) stable

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        update_cache: true
        state: present

    - name: Create app user
      user:
        name: appuser
        shell: /bin/bash
        groups: docker
        append: true

    - name: Create app directories
      file:
        path: "{{ item }}"
        state: directory
        owner: appuser
        group: appuser
        mode: "0755"
      loop:
        - /opt/nemotron
        - /opt/nemotron/data

    - name: Place nginx config for stub_status (monitoring)
      copy:
        dest: /opt/nemotron/nginx.conf
        content: |
          server {
            listen 80;
            server_name _;
            root /usr/share/nginx/html;
            location / {
              try_files $uri /index.html;
            }
            location = /status {
              stub_status on;
              access_log off;
            }
          }
      owner: appuser
      group: appuser
      mode: "0644"

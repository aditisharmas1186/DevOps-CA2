name: CI-CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{{{ github.repository }}}}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{{{ env.REGISTRY }}}}
          username: ${{{{ github.actor }}}}
          password: ${{{{ secrets.GITHUB_TOKEN }}}}

      - name: Extract image tag
        id: vars
        run: |
          SHA="${{{{ github.sha }}}}"
          echo "tag=${{ github.ref_name }}-${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{{{ env.REGISTRY }}}}/${{{{{ env.IMAGE_NAME }}}}}:${{{{ steps.vars.outputs.tag }}}}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Configure kubeconfig
        run: |
          echo "${{{{ secrets.KUBECONFIG_DATA }}}}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Render manifests (set image tag)
        run: |
          sed -i "s|REPLACE_IMAGE|${{{{ env.REGISTRY }}}}/${{{{{ env.IMAGE_NAME }}}}}:${{{{ steps.vars.outputs.tag }}}}|g" k8s/deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Show rollout status
        run: |
          kubectl -n nemotron rollout status deploy/nemotron-frontend --timeout=180s
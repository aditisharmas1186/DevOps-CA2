name: All Tasks Completed: Github CI/CD+ K8s+ IaC + Prometheus + Grafana

on:
  push:
    branches: [ Group11, main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # owner/repo (we'll lowercase it)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name (lowercase)
        id: prep
        run: |
          IMAGE_LC="$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          TAG="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
          echo "image=${IMAGE_LC}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Full image: ${IMAGE_LC}:${TAG}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.tag }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # Render deployment with the newly built image (write to a temp file)
      - name: Render manifests (inject image tag)
        run: |
          mkdir -p k8s/rendered
          sed "s|REPLACE_IMAGE|${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.tag }}|g" \
            k8s/deployment.yaml > k8s/rendered/deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/rendered/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Show rollout status
        run: |
          kubectl -n nemotron rollout status deploy/nemotron-frontend --timeout=180s
          kubectl -n nemotron get deploy,pods,svc
